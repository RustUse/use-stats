name: Release Publish Automation

on:
    workflow_dispatch:
        inputs:
            post-initial-release:
                description: Confirm the initial manual crates.io release wave is complete and all published stats crates already exist on crates.io
                required: true
                type: boolean

permissions:
    contents: write
    pull-requests: read
    id-token: write

concurrency:
    group: release-plz-release
    cancel-in-progress: false

jobs:
    release-plz-release:
        name: Release-plz Release
        if: ${{ !github.event.repository.fork && inputs.post-initial-release }}
        runs-on: ubuntu-latest
        env:
            CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
            PUBLISHED_CRATES: >-
                use-average use-variance use-standard-deviation use-percentile use-z-score use-correlation use-distribution
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Install stable Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  rustflags: ""
                  cache-workspaces: |
                      . -> target

            - name: Check publish token
              shell: bash
              run: |
                  if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
                    echo "CARGO_REGISTRY_TOKEN is required for release-plz publish." >&2
                    exit 1
                  fi

            - name: Confirm published crates already exist on crates.io
              shell: bash
              run: |
                  for crate in $PUBLISHED_CRATES; do
                      curl --fail --silent --show-error "https://crates.io/api/v1/crates/${crate}" > /dev/null
                  done

            - name: Run release-plz release
              uses: release-plz/action@v0.5
              with:
                  command: release
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
